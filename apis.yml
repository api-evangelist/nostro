aid: nostro
name: Nostro
description: >-
  Nostro refers to an account that a bank holds in a foreign currency at another
  bank (correspondent bank). Nostro account management involves reconciliation,
  liquidity management, and transaction tracking across correspondent banking
  relationships and multiple currencies.
